<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CPL STUDIOS</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');

/* BASE */
* {
  margin:0;
  padding:0;
  box-sizing:border-box;
  text-transform:uppercase;
  font-family:'Space Mono', monospace;
  letter-spacing:2px;
}

body {
  background:black;
  color:white;
  overflow-x:hidden;
  font-size:12px;
}

/* NAV */
.navbar {
  position:fixed;
  top:0;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:20px 40px;
  border-bottom:1px solid #222;
  background:black;
  z-index:1000;
}

.nav-links a {
  margin-left:20px;
  cursor:pointer;
  font-size:12px;
  transition:0.3s;
}

.nav-links a:hover {
  opacity:0.5;
}

/* SECTIONS */
.section {
  display:none;
  min-height:100vh;
  padding:140px 20px 60px;
  text-align:center;
}

.section.active {
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
  animation:fade 0.6s ease;
}

@keyframes fade {
  from { opacity:0; transform:translateY(20px); }
  to { opacity:1; transform:translateY(0); }
}

/* TYPOGRAPHY (AORTA STYLE) */
h1 {
  font-size:54px;
  letter-spacing:10px;
  font-weight:400;
  margin-bottom:20px;
}

h2 {
  font-size:26px;
  letter-spacing:6px;
  font-weight:400;
}

p {
  font-size:12px;
  letter-spacing:3px;
  opacity:0.8;
  max-width:600px;
  line-height:1.6;
}

/* CARD */
.card {
  border:1px solid white;
  padding:30px;
  max-width:700px;
  margin-top:30px;
}

/* INPUTS */
input {
  background:black;
  border:1px solid white;
  color:white;
  padding:12px;
  margin:10px;
  width:250px;
  font-family:'Space Mono', monospace;
  letter-spacing:2px;
}

button {
  background:white;
  color:black;
  border:none;
  padding:12px 20px;
  cursor:pointer;
  font-family:'Space Mono', monospace;
}

button:hover {
  opacity:0.7;
}

/* FOOTER */
footer {
  border-top:1px solid #222;
  text-align:center;
  padding:40px;
  font-size:11px;
  color:#777;
}
</style>
</head>

<body>

<!-- NAV -->
<div class="navbar">
  <div>CPLS</div>
  <div class="nav-links">
    <a onclick="showPage('home')">HOME</a>
    <a onclick="showPage('film')">FILM</a>
    <a onclick="showPage('store')">STORE</a>
    <a onclick="showPage('signup')">SIGN UP</a>
  </div>
</div>

<!-- HOME -->
<div id="home" class="section active">
  <h1>CPL STUDIOS</h1>
  <p>FILM • MUSIC • DESIGN</p>
  <p>A MINIMAL CINEMATIC CREATIVE STUDIO</p>
</div>

<!-- FILM -->
<div id="film" class="section">
  <h1>VEIL</h1>

  <div class="card">
    <h2>VEIL</h2>
    <p id="countdown"></p>
    <p>A DARK CINEMATIC THRILLER ABOUT MEMORY AND CONTROL.</p>
    <button onclick="alert('TRAILER COMING SOON')">WATCH TRAILER</button>
  </div>
</div>

<!-- STORE -->
<div id="store" class="section">
  <h1>STORE</h1>
  <p>COMING SOON</p>
</div>

<!-- SIGNUP -->
<div id="signup" class="section">
  <h1>SIGN UP</h1>

  <input type="email" id="email" placeholder="EMAIL">
  <button onclick="sendCode()">SEND CODE</button>

  <br>

  <input type="text" id="code" placeholder="CODE">
  <button onclick="verifyCode()">VERIFY</button>

  <p id="status"></p>
</div>

<script>

/* NAV FIX */
function showPage(page){
  const sections = document.querySelectorAll('.section');
  const target = document.getElementById(page);

  sections.forEach(s => s.classList.remove('active'));

  if(target){
    target.classList.add('active');
  } else {
    document.getElementById('home').classList.add('active');
  }
}

/* COUNTDOWN */
const targetDate = new Date("September 21, 2026 00:00:00").getTime();

setInterval(() => {
  const now = new Date().getTime();
  const diff = targetDate - now;

  const d = Math.floor(diff / (1000*60*60*24));
  const h = Math.floor((diff % (1000*60*60*24))/(1000*60*60));
  const m = Math.floor((diff % (1000*60*60))/(1000*60));
  const s = Math.floor((diff % (1000*60))/1000);

  const el = document.getElementById("countdown");
  if(el) el.innerText = `${d}D ${h}H ${m}M ${s}S`;
}, 1000);

/* DEMO OTP */
let generatedCode = "";

function sendCode(){
  const email = document.getElementById("email").value;
  if(!email) return alert("ENTER EMAIL");

  generatedCode = Math.floor(10000 + Math.random()*90000).toString();
  document.getElementById("status").innerText = "CODE SENT (DEMO)";
}

function verifyCode(){
  const input = document.getElementById("code").value;
  document.getElementById("status").innerText =
    input === generatedCode ? "VERIFIED" : "INVALID";
}

</script>

</body>
</html>
